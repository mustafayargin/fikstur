name: Send Notifications
on:
  schedule:
    - cron: "*/30 * * * *"

  workflow_dispatch:
    inputs:
      testMode:
        description: "normal = gerçek gönderim, dry-run = sadece log, test-now = hemen test bildirimi"
        required: true
        default: "normal"
        type: choice
        options:
          - normal
          - dry-run
          - test-now
jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Firebase Admin
        run: npm install firebase-admin

      - name: Run notification script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TEST_MODE: ${{ github.event.inputs.testMode || 'normal' }}
        run: |
          node <<'EOF'
          const admin = require("firebase-admin");

          console.log("====================================");
          console.log("Bildirim sistemi başladı");
          console.log("Çalışma modu:", process.env.TEST_MODE);
          console.log("Şu an UTC:", new Date().toISOString());
          console.log("====================================");

          if (!process.env.FIREBASE_SERVICE_ACCOUNT) {
            console.error("HATA: FIREBASE_SERVICE_ACCOUNT secret bulunamadı.");
            process.exit(1);
          }

          const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);

          admin.initializeApp({
            credential: admin.credential.cert(serviceAccount),
            databaseURL: "https://superlig-tahmin-panel-default-rtdb.europe-west1.firebasedatabase.app"
          });

          const db = admin.database();

          function parseMatchDate(dateValue) {
            if (!dateValue) return null;

            const text = String(dateValue).trim();
            const hasTimezone = /Z$|[+-]\d{2}:\d{2}$/.test(text);
            const fixedText = hasTimezone ? text : text + "+03:00";

            const d = new Date(fixedText);
            if (isNaN(d.getTime())) return null;

            return d;
          }

          function getNotificationType(diffHours) {
            // 24 saat bildirimi kapatıldı
            if (diffHours <= 3 && diffHours > 2) return "3h";
            if (diffHours <= 1 && diffHours > 0) return "1h";
            return null;
          }

          function typeText(type) {
            if (type === "3h") return "3 saat";
            if (type === "1h") return "1 saat";
            return type;
          }

          async function sendToTokens(tokens, title, body) {
            const message = {
              data: {
                title: title,
                body: body,
                url: "./index.html"
              },
              tokens: tokens
            };

            return await admin.messaging().sendEachForMulticast(message);
          }

          async function run() {
            console.log("Firebase verileri okunuyor...");

            const tokensSnap = await db.ref("fcmTokens").once("value");
            const matchesSnap = await db.ref("matches").once("value");
            const sentSnap = await db.ref("sentNotifications").once("value");

            const tokensData = tokensSnap.val() || {};
            const matchesData = matchesSnap.val() || {};
            const sentData = sentSnap.val() || {};

            const tokens = Object.values(tokensData)
              .map((item) => item && item.token)
              .filter(Boolean);

            const matches = Object.entries(matchesData);

            console.log("Token kayıt sayısı:", Object.keys(tokensData).length);
            console.log("Geçerli token sayısı:", tokens.length);
            console.log("Maç sayısı:", matches.length);
            console.log("sentNotifications kayıt sayısı:", Object.keys(sentData).length);

            if (!tokens.length) {
              console.log("Çıkış: Geçerli token yok.");
              return;
            }

            if (!matches.length) {
              console.log("Çıkış: Maç yok.");
              return;
            }

            if (process.env.TEST_MODE === "test-now") {
              console.log("TEST-NOW modu aktif. Hemen test bildirimi gönderiliyor...");

              const res = await sendToTokens(
                tokens,
                "⚽ Tahmin Paneli Test 😊",
                "Bu bir GitHub Actions test bildirimidir 🔥"
              );

              console.log("Test gönderim sonucu:");
              console.log("Başarılı:", res.successCount);
              console.log("Başarısız:", res.failureCount);

              res.responses.forEach((r, i) => {
                if (!r.success) {
                  console.log("Token hata index:", i, r.error && r.error.message);
                }
              });

              return;
            }

            const now = new Date();

            console.log("------------------------------------");
            console.log("Yeni hafta bildirimi kontrol ediliyor...");
            console.log("------------------------------------");

            const weeksMap = {};

            for (const [matchId, match] of matches) {
              const weekNo = match.weekNo || "unknown";

              if (!weeksMap[weekNo]) {
                weeksMap[weekNo] = {
                  weekNo: weekNo,
                  matchCount: 0,
                  futureMatchCount: 0,
                  firstMatchDate: null
                };
              }

              weeksMap[weekNo].matchCount++;

              const matchDate = parseMatchDate(match.date);

              if (matchDate && matchDate.getTime() > now.getTime()) {
                weeksMap[weekNo].futureMatchCount++;

                if (!weeksMap[weekNo].firstMatchDate || matchDate < weeksMap[weekNo].firstMatchDate) {
                  weeksMap[weekNo].firstMatchDate = matchDate;
                }
              }
            }

            for (const weekNo of Object.keys(weeksMap)) {
              const weekInfo = weeksMap[weekNo];
              const key = "week_" + weekNo + "_added";

              console.log("");
              console.log("Hafta kontrol:", weekNo);
              console.log("Haftadaki maç sayısı:", weekInfo.matchCount);
              console.log("Gelecek maç sayısı:", weekInfo.futureMatchCount);
              console.log("İlk gelecek maç:", weekInfo.firstMatchDate ? weekInfo.firstMatchDate.toISOString() : "Yok");

              if (weekNo === "unknown") {
                console.log("Atlandı: weekNo yok.");
                continue;
              }

              if (weekInfo.futureMatchCount <= 0) {
                console.log("Atlandı: Bu haftada gelecek maç yok.");
                continue;
              }

              if (sentData[key]) {
                console.log("Atlandı: Yeni hafta bildirimi daha önce gönderilmiş:", key);
                continue;
              }

              const title = "📅 Yeni hafta eklendi! ⚽";
              const body = "Tahminlerinizi girebilirsiniz 🔥";

              console.log("Yeni hafta bildirimi yakalandı:", key);
              console.log("Başlık:", title);
              console.log("Mesaj:", body);

              if (process.env.TEST_MODE === "dry-run") {
                console.log("DRY-RUN: Yeni hafta bildirimi gönderilmedi, sentNotifications yazılmadı.");
                continue;
              }

              const res = await sendToTokens(tokens, title, body);

              console.log("Yeni hafta gönderim sonucu:");
              console.log("Başarılı:", res.successCount);
              console.log("Başarısız:", res.failureCount);

              res.responses.forEach((r, i) => {
                if (!r.success) {
                  console.log("Token hata index:", i, r.error && r.error.message);
                }
              });

              if (res.successCount > 0) {
                sentData[key] = true;

                await db.ref("sentNotifications/" + key).set({
                  sent: true,
                  type: "week_added",
                  weekNo: weekNo,
                  matchCount: weekInfo.matchCount,
                  futureMatchCount: weekInfo.futureMatchCount,
                  firstMatchDate: weekInfo.firstMatchDate ? weekInfo.firstMatchDate.toISOString() : "",
                  sentAt: new Date().toISOString(),
                  successCount: res.successCount,
                  failureCount: res.failureCount
                });

                console.log("sentNotifications kaydedildi:", key);
              } else {
                console.log("Hiç başarılı gönderim yok. Yeni hafta bildirimi kaydedilmedi.");
              }
            }

            console.log("------------------------------------");
            console.log("Maç zamanı bildirimleri kontrol ediliyor...");
            console.log("------------------------------------");

            for (const [matchId, match] of matches) {
              console.log("");
              console.log("Maç kontrol:", matchId);
              console.log("Hafta:", match.weekNo || "Yok");
              console.log("Ev sahibi:", match.homeTeam || "Yok");
              console.log("Deplasman:", match.awayTeam || "Yok");
              console.log("Ham tarih:", match.date || "Yok");

              if (!match.date) {
                console.log("Atlandı: Maç tarihi yok.");
                continue;
              }

              const matchDate = parseMatchDate(match.date);

              if (!matchDate) {
                console.log("Atlandı: Maç tarihi geçersiz.");
                continue;
              }

              const diffMs = matchDate.getTime() - now.getTime();
              const diffHours = diffMs / (1000 * 60 * 60);

              console.log("Maç tarihi ISO:", matchDate.toISOString());
              console.log("Kalan saat:", diffHours.toFixed(2));

              if (diffHours <= 0) {
                console.log("Atlandı: Maç başlamış veya geçmiş.");
                continue;
              }

              const type = getNotificationType(diffHours);

              if (!type) {
                console.log("Atlandı: 3h / 1h bildirim aralığında değil.");
                continue;
              }

              console.log("Yakalanan bildirim tipi:", type);

              const weekNo = match.weekNo || "unknown";
              const key = "week_" + weekNo + "_" + type;

              if (sentData[key]) {
                console.log("Atlandı: Bu hafta için bu bildirim daha önce gönderilmiş:", key);
                continue;
              }

              const title = "😊 Haftanın maçları başlamak üzere ";
              const body = `⚽ Haftanın maçları ${typeText(type)} içinde başlıyor! Tahminini yapmayı unutma 🔥`;

              console.log("Gönderilecek bildirim key:", key);
              console.log("Başlık:", title);
              console.log("Mesaj:", body);

              if (process.env.TEST_MODE === "dry-run") {
                console.log("DRY-RUN: Bildirim gönderilmedi, sentNotifications yazılmadı.");
                continue;
              }

              const res = await sendToTokens(tokens, title, body);

              console.log("Gönderim sonucu:");
              console.log("Başarılı:", res.successCount);
              console.log("Başarısız:", res.failureCount);

              res.responses.forEach((r, i) => {
                if (!r.success) {
                  console.log("Token hata index:", i, r.error && r.error.message);
                }
              });

              if (res.successCount > 0) {
                sentData[key] = true;

                await db.ref("sentNotifications/" + key).set({
                  sent: true,
                  type: type,
                  matchId: matchId,
                  homeTeam: match.homeTeam || "",
                  awayTeam: match.awayTeam || "",
                  weekNo: match.weekNo || "",
                  matchDate: match.date,
                  sentAt: new Date().toISOString(),
                  successCount: res.successCount,
                  failureCount: res.failureCount
                });

                console.log("sentNotifications kaydedildi:", key);
              } else {
                console.log("Hiç başarılı gönderim yok. sentNotifications yazılmadı.");
              }
            }

            console.log("");
            console.log("Bildirim kontrolü tamamlandı.");
          }

          run().catch((err) => {
            console.error("GENEL HATA:", err);
            process.exit(1);
          });
          EOF
