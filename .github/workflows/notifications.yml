run: |
  node <<'EOF'
  const admin = require("firebase-admin");

  const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);

  admin.initializeApp({
    credential: admin.credential.cert(serviceAccount),
    databaseURL: "https://superlig-tahmin-panel-default-rtdb.europe-west1.firebasedatabase.app"
  });

  const db = admin.database();

  async function run() {
    const tokensSnap = await db.ref("fcmTokens").once("value");
    const matchesSnap = await db.ref("matches").once("value");
    const sentSnap = await db.ref("sentNotifications").once("value");

    const tokensData = tokensSnap.val();
    const matches = matchesSnap.val();
    const sent = sentSnap.val() || {};

    if (!tokensData || !matches) {
      console.log("Token veya match yok");
      return;
    }

    const tokens = Object.values(tokensData)
      .map((item) => item && item.token)
      .filter(Boolean);

    if (!tokens.length) {
      console.log("Token yok");
      return;
    }

    const now = new Date();

    for (const [matchId, match] of Object.entries(matches)) {
      if (!match.date) continue;

      const matchDate = new Date(match.date);
      const diffMs = matchDate - now;
      const diffHours = diffMs / (1000 * 60 * 60);

      let type = null;

      if (diffHours <= 24 && diffHours > 23) type = "24h";
      else if (diffHours <= 3 && diffHours > 2) type = "3h";
      else if (diffHours <= 1 && diffHours > 0) type = "1h";

      if (!type) continue;

      const key = matchId + "_" + type;

      if (sent[key]) {
        console.log("Zaten gönderilmiş:", key);
        continue;
      }

      console.log("Bildirim gönderiliyor:", key);

      const message = {
        data: {
          title: "Tahmin Paneli",
          body: `${match.homeTeam} - ${match.awayTeam} maçı ${type} içinde başlıyor!`,
          url: "./index.html"
        },
        tokens: tokens
      };

      const res = await admin.messaging().sendEachForMulticast(message);

      console.log("Gönderildi:", res.successCount);

      await db.ref("sentNotifications/" + key).set(true);
    }
  }

  run().catch((err) => {
    console.error(err);
    process.exit(1);
  });
  EOF