name: Send Notifications

on:
  workflow_dispatch:
    inputs:
      testMode:
        description: "Çalışma Modu"
        required: true
        default: "normal"
        type: choice
        options:
          - normal
          - dry-run
          - test-now

permissions:
  contents: read
  actions: write

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase Admin
        run: npm install firebase-admin

      - name: Run Notification Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TEST_MODE: ${{ github.event.inputs.testMode || 'normal' }}
        run: |
          node <<'EOF'
          const admin = require("firebase-admin");

          async function run() {
            console.log("====================================");
            console.log("Bildirim Sistemi Başlatıldı");
            console.log("Mod:", process.env.TEST_MODE);
            console.log("Zaman (UTC):", new Date().toISOString());
            console.log("====================================");

            if (!process.env.FIREBASE_SERVICE_ACCOUNT) {
              console.error("HATA: FIREBASE_SERVICE_ACCOUNT secret eksik!");
              process.exit(1);
            }

            const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);

            admin.initializeApp({
              credential: admin.credential.cert(serviceAccount),
              databaseURL: "https://superlig-tahmin-panel-default-rtdb.europe-west1.firebasedatabase.app"
            });

            const db = admin.database();

            const parseMatchDate = (dateValue) => {
              if (!dateValue) return null;
              const text = String(dateValue).trim();
              const fixedText = /Z$|[+-]\d{2}:\d{2}$/.test(text) ? text : text + "+03:00";
              const d = new Date(fixedText);
              return isNaN(d.getTime()) ? null : d;
            };

            const getNotificationType = (diffHours) => {
              if (diffHours <= 3 && diffHours > 2) return "3h";
              if (diffHours <= 2 && diffHours > 0) return "2h";
              return null;
            };

            const withTimeout = (promise, ms, label) => {
              const timeoutPromise = new Promise((_, reject) => {
                setTimeout(() => reject(new Error(`${label} zaman aşımına uğradı`)), ms);
              });

              return Promise.race([promise, timeoutPromise]);
            };

            const sendToTokens = async (tokens, title, body) => {
              const message = {
                data: {
                  title,
                  body,
                  url: "./index.html"
                },
                tokens
              };

              return await withTimeout(
                admin.messaging().sendEachForMulticast(message),
                30000,
                "FCM bildirim gönderimi"
              );
            };

            const [tokensSnap, usersSnap, matchesSnap, sentSnap, queueSnap] = await Promise.all([
              db.ref("fcmTokens").once("value"),
              db.ref("users").once("value"),
              db.ref("matches").once("value"),
              db.ref("sentNotifications").once("value"),
              db.ref("adminNotificationQueue").once("value")
            ]);

            const tokenRecords = Object.values(tokensSnap.val() || {})
              .filter(i => i?.token);

            const usersData = usersSnap.val() || {};
            const activeUserIds = new Set(
              Object.values(usersData)
                .filter(u => u && u.aktif !== false && u.active !== false)
                .flatMap(u => [u.id, u.playerId, u.kisiId, u.kullaniciAdi].filter(Boolean).map(String))
            );

            const selectTokensForTarget = (target) => {
              const selected = tokenRecords.filter((item) => {
                if (target === "active") {
                  const ids = [item.userId, item.playerId, item.username, item.kullaniciAdi]
                    .filter(Boolean)
                    .map(String);
                  return ids.length === 0 || ids.some(id => activeUserIds.has(id));
                }

                // pending hedefi ikinci aşamada tahmini eksik kullanıcı filtrelemesine bağlanacak.
                // Şimdilik güvenli davranıp tüm tokenlara gönderiyoruz.
                return true;
              });

              return [...new Set(selected.map(i => i.token).filter(Boolean))];
            };

            const tokens = selectTokensForTarget("all");

            const matches = Object.entries(matchesSnap.val() || {});
            const sentData = sentSnap.val() || {};
            const queueData = queueSnap.val() || {};

            console.log(`Token: ${tokens.length} | Maç: ${matches.length}`);

            if (tokens.length === 0) {
              console.log("Gönderilecek token yok.");
              return;
            }

            if (process.env.TEST_MODE === "test-now") {
              const res = await sendToTokens(
                tokens,
                "⚽ Skor Avcıları Test",
                "Test bildirimi aktif! 🔥"
              );

              console.log("Test sonucu:", res.successCount, "başarılı.");
              return;
            }

            const pendingManualNotifications = Object.entries(queueData)
              .filter(([id, item]) => item && item.status === "pending" && item.type === "manual")
              .sort((a, b) => String(a[1].createdAt || "").localeCompare(String(b[1].createdAt || "")))
              .slice(0, 5);

            for (const [queueId, item] of pendingManualNotifications) {
              const targetTokens = selectTokensForTarget(item.target || "all");
              const startedAt = new Date().toISOString();

              console.log(`Manuel bildirim gönderiliyor: ${queueId} | hedef token: ${targetTokens.length}`);

              await db.ref(`adminNotificationQueue/${queueId}`).update({
                status: "processing",
                startedAt,
                updatedAt: startedAt
              });

              try {
                if (targetTokens.length === 0) {
                  throw new Error("Hedef kullanıcı/token bulunamadı.");
                }

                let res = { successCount: 0, failureCount: 0 };
                if (process.env.TEST_MODE === "normal") {
                  res = await sendToTokens(
                    targetTokens,
                    item.title || "Skor Avcıları",
                    item.message || "Yeni bildirimin var."
                  );
                }

                const finishedAt = new Date().toISOString();
                await db.ref(`adminNotificationQueue/${queueId}`).update({
                  status: "sent",
                  successCount: res.successCount || 0,
                  errorCount: res.failureCount || 0,
                  finishedAt,
                  updatedAt: finishedAt
                });

                await db.ref(`notificationLogs/${queueId}`).set({
                  type: "Manuel",
                  status: "sent",
                  title: item.title || "Skor Avcıları",
                  message: item.message || "Yeni bildirimin var.",
                  target: item.target || "all",
                  successCount: res.successCount || 0,
                  errorCount: res.failureCount || 0,
                  createdAt: finishedAt
                });
              } catch (error) {
                const failedAt = new Date().toISOString();
                console.error(`Manuel bildirim hata verdi (${queueId}):`, error);

                await db.ref(`adminNotificationQueue/${queueId}`).update({
                  status: "error",
                  errorMessage: error.message || String(error),
                  finishedAt: failedAt,
                  updatedAt: failedAt
                });

                await db.ref(`notificationLogs/${queueId}`).set({
                  type: "Manuel",
                  status: "error",
                  title: item.title || "Skor Avcıları",
                  message: item.message || "Yeni bildirimin var.",
                  target: item.target || "all",
                  errorMessage: error.message || String(error),
                  createdAt: failedAt
                });
              }
            }

            const now = new Date();

            const weeksMap = {};

            matches.forEach(([id, m]) => {
              const w = m.weekNo || "unknown";

              if (!weeksMap[w]) {
                weeksMap[w] = {
                  futureMatchCount: 0,
                  firstMatchDate: null
                };
              }

              const mDate = parseMatchDate(m.date);

              if (mDate && mDate > now) {
                weeksMap[w].futureMatchCount++;

                if (!weeksMap[w].firstMatchDate || mDate < weeksMap[w].firstMatchDate) {
                  weeksMap[w].firstMatchDate = mDate;
                }
              }
            });

            for (const [weekNo, info] of Object.entries(weeksMap)) {
              const key = `week_${weekNo}_added`;

              if (weekNo !== "unknown" && info.futureMatchCount > 0 && !sentData[key]) {
                console.log(`${weekNo}. hafta bildirimi gönderiliyor...`);

                if (process.env.TEST_MODE === "normal") {
                  const res = await sendToTokens(
                    tokens,
                    `📅 ${weekNo}. hafta açıldı!`,
                    "😅 Tahminlerini girmeyi unutma! ⚽"
                  );

                  console.log("Yeni hafta bildirim sonucu:", res.successCount, "başarılı.");

                  if (res.successCount > 0) {
                    await db.ref(`sentNotifications/${key}`).set({
                      sent: true,
                      sentAt: new Date().toISOString(),
                      weekNo
                    });
                  }
                }
              }
            }

            for (const [id, m] of matches) {
              const mDate = parseMatchDate(m.date);
              if (!mDate) continue;

              const diffHours = (mDate - now) / 3600000;
              const type = getNotificationType(diffHours);

              if (type) {
                const key = `week_${m.weekNo || "x"}_${type}`;

                if (!sentData[key]) {
                  console.log(`Maç hatırlatıcı (${type}) gönderiliyor: ${m.homeTeam || ""}`);

                  if (process.env.TEST_MODE === "normal") {
                    const res = await sendToTokens(
                      tokens,
                      "⚽ Maçlar başlamak üzere!",
                      `Tahminlerini unutma! Maçlar ${type === "3h" ? "3 saat" : "2 saat"} içinde başlıyor.`
                    );

                    console.log("Maç hatırlatıcı sonucu:", res.successCount, "başarılı.");

                    if (res.successCount > 0) {
                      await db.ref(`sentNotifications/${key}`).set({
                        sent: true,
                        sentAt: new Date().toISOString(),
                        type,
                        successCount: res.successCount || 0,
                        errorCount: res.failureCount || 0
                      });
                    }
                  }
                }
              }
            }
          }

          run()
            .then(() => {
              console.log("Bildirim kontrolü tamamlandı.");
              process.exit(0);
            })
            .catch(e => {
              console.error("Bildirim sistemi hata verdi:", e);
              process.exit(1);
            });
          EOF
