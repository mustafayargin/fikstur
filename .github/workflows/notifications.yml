name: Send Notifications

on:
  workflow_dispatch:
    inputs:
      testMode:
        description: "Çalışma Modu"
        required: true
        default: "normal"
        type: choice
        options:
          - normal
          - dry-run
          - test-now

permissions:
  contents: read
  actions: write

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase Admin
        run: npm install firebase-admin

      - name: Run Notification Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TEST_MODE: ${{ github.event.inputs.testMode || 'normal' }}
        run: |
          node <<'EOF'
          const admin = require("firebase-admin");

          async function run() {
            console.log("====================================");
            console.log("Bildirim Sistemi Başlatıldı");
            console.log("Mod:", process.env.TEST_MODE);
            console.log("Zaman (UTC):", new Date().toISOString());
            console.log("====================================");

            if (!process.env.FIREBASE_SERVICE_ACCOUNT) {
              console.error("HATA: FIREBASE_SERVICE_ACCOUNT secret eksik!");
              process.exit(1);
            }

            const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);

            admin.initializeApp({
              credential: admin.credential.cert(serviceAccount),
              databaseURL: "https://superlig-tahmin-panel-default-rtdb.europe-west1.firebasedatabase.app"
            });

            const db = admin.database();

            const parseMatchDate = (dateValue) => {
              if (!dateValue) return null;
              const text = String(dateValue).trim();
              const fixedText = /Z$|[+-]\d{2}:\d{2}$/.test(text) ? text : text + "+03:00";
              const d = new Date(fixedText);
              return isNaN(d.getTime()) ? null : d;
            };

            const getNotificationType = (diffHours) => {
              if (diffHours <= 3 && diffHours > 2) return "3h";
              if (diffHours <= 2 && diffHours > 0) return "2h";
              return null;
            };

            const withTimeout = (promise, ms, label) => {
              const timeoutPromise = new Promise((_, reject) => {
                setTimeout(() => reject(new Error(`${label} zaman aşımına uğradı`)), ms);
              });

              return Promise.race([promise, timeoutPromise]);
            };

            const sendToTokens = async (tokens, title, body) => {
              const message = {
                data: {
                  title,
                  body,
                  url: "./index.html"
                },
                tokens
              };

              return await withTimeout(
                admin.messaging().sendEachForMulticast(message),
                30000,
                "FCM bildirim gönderimi"
              );
            };

            const [tokensSnap, matchesSnap, sentSnap] = await Promise.all([
              db.ref("fcmTokens").once("value"),
              db.ref("matches").once("value"),
              db.ref("sentNotifications").once("value")
            ]);

            const tokens = Object.values(tokensSnap.val() || {})
              .map(i => i?.token)
              .filter(Boolean);

            const matches = Object.entries(matchesSnap.val() || {});
            const sentData = sentSnap.val() || {};

            console.log(`Token: ${tokens.length} | Maç: ${matches.length}`);

            if (tokens.length === 0) {
              console.log("Gönderilecek token yok.");
              return;
            }

            if (process.env.TEST_MODE === "test-now") {
              const res = await sendToTokens(
                tokens,
                "⚽ Skor Avcıları Test",
                "Test bildirimi aktif! 🔥"
              );

              console.log("Test sonucu:", res.successCount, "başarılı.");
              return;
            }

            const now = new Date();

            const weeksMap = {};

            matches.forEach(([id, m]) => {
              const w = m.weekNo || "unknown";

              if (!weeksMap[w]) {
                weeksMap[w] = {
                  futureMatchCount: 0,
                  firstMatchDate: null
                };
              }

              const mDate = parseMatchDate(m.date);

              if (mDate && mDate > now) {
                weeksMap[w].futureMatchCount++;

                if (!weeksMap[w].firstMatchDate || mDate < weeksMap[w].firstMatchDate) {
                  weeksMap[w].firstMatchDate = mDate;
                }
              }
            });

            for (const [weekNo, info] of Object.entries(weeksMap)) {
              const key = `week_${weekNo}_added`;

              if (weekNo !== "unknown" && info.futureMatchCount > 0 && !sentData[key]) {
                console.log(`${weekNo}. hafta bildirimi gönderiliyor...`);

                if (process.env.TEST_MODE === "normal") {
                  const res = await sendToTokens(
                    tokens,
                    `📅 ${weekNo}. hafta açıldı!`,
                    "😅 Tahminlerini girmeyi unutma! ⚽"
                  );

                  console.log("Yeni hafta bildirim sonucu:", res.successCount, "başarılı.");

                  if (res.successCount > 0) {
                    await db.ref(`sentNotifications/${key}`).set({
                      sent: true,
                      sentAt: new Date().toISOString(),
                      weekNo
                    });
                  }
                }
              }
            }

            for (const [id, m] of matches) {
              const mDate = parseMatchDate(m.date);
              if (!mDate) continue;

              const diffHours = (mDate - now) / 3600000;
              const type = getNotificationType(diffHours);

              if (type) {
                const key = `week_${m.weekNo || "x"}_${type}`;

                if (!sentData[key]) {
                  console.log(`Maç hatırlatıcı (${type}) gönderiliyor: ${m.homeTeam || ""}`);

                  if (process.env.TEST_MODE === "normal") {
                    const res = await sendToTokens(
                      tokens,
                      "⚽ Maçlar başlamak üzere!",
                      `Tahminlerini unutma! Maçlar ${type === "3h" ? "3 saat" : "2 saat"} içinde başlıyor.`
                    );

                    console.log("Maç hatırlatıcı sonucu:", res.successCount, "başarılı.");

                    if (res.successCount > 0) {
                      await db.ref(`sentNotifications/${key}`).set({
                        sent: true,
                        sentAt: new Date().toISOString(),
                        type
                      });
                    }
                  }
                }
              }
            }
          }

          run()
            .then(() => {
              console.log("Bildirim kontrolü tamamlandı.");
              process.exit(0);
            })
            .catch(e => {
              console.error("Bildirim sistemi hata verdi:", e);
              process.exit(1);
            });
          EOF
